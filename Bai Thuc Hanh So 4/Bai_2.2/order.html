<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Form</title>
    <link rel="stylesheet" href="order.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>
    <form class="order-form">
        <h1>Order Form</h1>
        <div class="form-rows">
            <label for="product">Tên sản phẩm</label>
            <select id="product">
                <option value="">-- Chọn sản phẩm --</option>
                <option value="ao">Áo</option>
                <option value="quan">Quần</option>
                <option value="giay">Giày</option>
            </select>
            <span class="error" id="product-error"></span>
        </div>

        <div class="form-rows">
            <label for="soluong">Số lượng</label>
            <input type="number" id="soluong" class="soluong">
            <span class="error" id="quantity-error"></span>
        </div>

        <div class="form-rows">
            <label for="order-date">Ngày giao hàng</label>
            <input type="date" id="order-date" class="order-date">
            <span class="error" id="order-date-error"></span>
        </div>

        <div class="form-rows">
            <label for="order-address">Địa chỉ giao</label>
            <input type="text" id="order-address" class="order-address" required>
            <span class="error" id="order-address-error"></span>
        </div>

        <div class="form-rows">
            <label for="note">Ghi chú</label>
            <textarea id="note" maxlength="200"></textarea>
            <div id="note-count">0/200</div>
            <span class="error" id="note-error"></span>
        </div>

        <div class="form-rows">
            <label for="pay-method">Phương thức thanh toán</label>
            <input type="radio" name="pay-method" id="COD" value="COD">
            <label for="COD">COD</label>

            <input type="radio" name="pay-method" id="Chuyển khoản" value="Chuyển khoản">
            <label for="Chuyển khoản">Chuyển khoản</label>

            <input type="radio" name="pay-method" id="Ví điện tử" value="Ví điện tử">
            <label for="Ví điện tử ">Ví điện tử </label>
            <span class="error" id="pay-method-error"></span>
        </div>

        <div class="form-rows">
            <label>Tổng tiền</label>
            <div id="total-price">0 VND</div>
        </div>

        <div class="form-actions">
            <button type="submit">Đặt Hàng</button>
        </div>

    </form>
    <div id="confirm-box" style="display:none" class="confirm-box">

        <h2>Xác nhận đặt hàng</h2>

        <div id="order-summary"></div>

        <div class="confirm-actions">
            <button type="button" id="confirm-btn">Xác nhận</button>
            <button type="button" id="cancel-btn">Hủy</button>
        </div>

    </div>

    <script src="order.js"></script>
</body>

</html>
