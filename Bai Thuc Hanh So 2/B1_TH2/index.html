<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BT1_Flexbox</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Get in touch with us by filling contact form below</h1>

        <form action="">
            <input type="text" id="fullname" placeholder="*Enter your full name">
            <input type="email" id="email" placeholder="*Enter your email address">
            <input type="text" id="subject" placeholder="Enter your subject">
            <textarea class="message" placeholder="*Your message here..."></textarea>
            <input type="button" value="Send message">
            <p>* Please fill all require form field, thanks!</p>
        </form>
    </div>
</body>

</html>
